<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

.input-group{
margin:15px 0;
text-align:left;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:20px;
font-size:18px;
background:#007BFF;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.category{
margin-top:10px;
font-size:17px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:14px;
}

table,th,td{
border:1px solid #ddd;
}

th{
background:#007BFF;
color:white;
padding:8px;
}

td{
padding:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>BMI Calculator</h2>

<div class="input-group">
<label>Height (cm)</label>
<input type="number" id="height" placeholder="Enter height">
</div>

<div class="input-group">
<label>Weight (kg)</label>
<input type="number" id="weight" placeholder="Enter weight">
</div>

<button onclick="calculateBMI()">Calculate BMI</button>

<div class="result" id="result"></div>
<div class="category" id="category"></div>

<table>
<tr>
<th>BMI</th>
<th>Category</th>
</tr>
<tr>
<td>Below 18.5</td>
<td>Underweight</td>
</tr>
<tr>
<td>18.5 - 24.9</td>
<td>Normal Weight</td>
</tr>
<tr>
<td>25 - 29.9</td>
<td>Overweight</td>
</tr>
<tr>
<td>30+</td>
<td>Obese</td>
</tr>
</table>

</div>

<script>

function calculateBMI(){

let height=document.getElementById("height").value;
let weight=document.getElementById("weight").value;

if(height=="" || weight==""){
alert("Please enter height and weight.");
return;
}

height=height/100;

let bmi=(weight/(height*height)).toFixed(2);

let category="";

if(bmi<18.5){
category="Underweight";
}
else if(bmi<25){
category="Normal Weight";
}
else if(bmi<30){
category="Overweight";
}
else{
category="Obese";
}

document.getElementById("result").innerHTML="Your BMI: "+bmi;
document.getElementById("category").innerHTML="Category: "+category;

}

</script>

</body>
</html>
